# ── Log rotation policy (YAML anchors) ──────────────────────────────────────
# Limita lo spazio occupato dai log Docker su disco. Senza questi blocchi,
# i file json-log crescerebbero indefinitamente.
#   standard: 30MB max per container (10MB × 3 file rotanti)
#   ollama:   60MB max (20MB × 3) — loggaa di più durante pull modelli
x-logging-default: &logging-default
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-logging-ollama: &logging-ollama
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:

  # ── Ollama locale (solo se usi --profile ollama-local) ──────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    profiles:
      - ollama-local
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_NUM_PARALLEL: 1
    deploy:
      resources:
        limits:
          memory: 3G
    logging: *logging-ollama

  # ── Ollama model puller (solo con profile ollama-local) ─────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    profiles:
      - ollama-local
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "sleep 5 && ollama pull ${OLLAMA_MODEL:-qwen3:1.7b} && echo 'Modello pronto'"]
    restart: "no"
    logging: *logging-default

  # ── Validatore CSV MCP (NUOVO) ──────────────────────────────────────────────
  validatore-mcp:
    build:
      context: ./validatore-mcp
      dockerfile: Dockerfile
    container_name: validatore-mcp
    restart: unless-stopped
    ports:
      - "3002:3002"
    logging: *logging-default

  # ── RDF MCP — CSV to RDF/TTL ────────────────────────────────────────────────
  rdf-mcp:
    build:
      context: ./rdf-mcp
      dockerfile: Dockerfile
    container_name: rdf-mcp
    restart: unless-stopped
    ports:
      - "3003:3003"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    logging: *logging-default

  # ── Backend Node.js ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./ckan-chat/backend
      dockerfile: Dockerfile
    container_name: ckan-chat-backend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      SERVER_IP: ${SERVER_IP:-localhost}
      MCP_URL_VALIDATORE: http://validatore-mcp:3002/mcp
      MCP_URL_RDF: http://rdf-mcp:3003
      LLM_PROVIDER: ${LLM_PROVIDER:-mistral}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:1.7b}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      ANALYTICS_URL: http://analytics-service:3004
      ADMIN_TOKEN: ${ADMIN_TOKEN:-changeme-admin}
      BLOCKLIST_PATH: /app/data/blocklist.json
      SPARQL_ENDPOINT: ${SPARQL_ENDPOINT:-https://lod.dati.gov.it/sparql}
    volumes:
      - blocklist_data:/app/data
    depends_on:
      - validatore-mcp
      - rdf-mcp
    logging: *logging-default

  # ── Frontend React ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./ckan-chat/frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_BASE_PATH: /chatbot/
        VITE_ANALYTICS_URL: ${VITE_ANALYTICS_URL:-}
        VITE_ANALYTICS_TOKEN: ${VITE_ANALYTICS_TOKEN:-changeme}
        VITE_ADMIN_TOKEN: ${VITE_ADMIN_TOKEN:-changeme-admin}
        VITE_SPARQL_ENDPOINT: ${SPARQL_ENDPOINT:-}
    container_name: ckan-chat-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    logging: *logging-default

  # ── Analytics Service ───────────────────────────────────────────────────────
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    restart: unless-stopped
    ports:
      - "${ANALYTICS_PORT:-3004}:3004"
    environment:
      PORT: 3004
      CHATBOT_ORIGIN: ${CHATBOT_ORIGIN:?CHATBOT_ORIGIN deve essere definita in .env (es. https://tuo-dominio.it)}
      ANALYTICS_TOKEN: ${ANALYTICS_TOKEN:-changeme}
      SQLITE_PATH: /app/data/analytics.db
    volumes:
      - analytics_data:/app/data
    depends_on:
      - backend
    logging: *logging-default

volumes:
  blocklist_data:
  ollama_data:
  analytics_data:
