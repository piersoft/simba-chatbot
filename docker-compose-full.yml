services:

  # ── Ollama locale (solo se usi --profile ollama-local) ──────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    profiles:
      - ollama-local
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_NUM_PARALLEL: 1
    deploy:
      resources:
        limits:
          memory: 3G

  # ── Ollama model puller (solo con profile ollama-local) ─────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    profiles:
      - ollama-local
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "sleep 5 && ollama pull ${OLLAMA_MODEL:-qwen2.5:1.5b} && echo 'Modello pronto'"]
    restart: "no"

  # ── Validatore CSV MCP (NUOVO) ──────────────────────────────────────────────
  validatore-mcp:
    build:
      context: ./validatore-mcp
      dockerfile: Dockerfile
    container_name: validatore-mcp
    restart: unless-stopped
    ports:
      - "3002:3002"

  # ── RDF MCP — CSV to RDF/TTL ────────────────────────────────────────────────
  rdf-mcp:
    build:
      context: ./rdf-mcp
      dockerfile: Dockerfile
    container_name: rdf-mcp
    restart: unless-stopped
    ports:
      - "3003:3003"
    dns:
      - 8.8.8.8
      - 1.1.1.1

  # ── Backend Node.js ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./ckan-chat/backend
      dockerfile: Dockerfile
    container_name: ckan-chat-backend
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      SERVER_IP: ${SERVER_IP:-localhost}
      MCP_URL_VALIDATORE: http://validatore-mcp:3002/mcp
      MCP_URL_RDF: http://rdf-mcp:3003
      LLM_PROVIDER: ${LLM_PROVIDER:-mistral}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      - validatore-mcp
      - rdf-mcp

  # ── Frontend React ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./ckan-chat/frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-}
        VITE_BASE_PATH: /chatbot/
    container_name: ckan-chat-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  ollama_data:
