services:

  # ── Ollama ────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=1
    deploy:
      resources:
        limits:
          memory: 3G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Ollama model puller ───────────────────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_MODEL:-qwen3:1.7b} && echo 'Modello pronto'"]
    restart: "no"

  # ── CKAN MCP Server ───────────────────────────────────────────────────────
  ckan-mcp-server:
    build:
      context: ./ckan-mcp-server
      dockerfile: Dockerfile
    image: ckan-mcp-server:latest
    container_name: ckan-mcp-server
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-3000}:3000"
    environment:
      TRANSPORT: http
      PORT: 3000
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://localhost:3000/mcp",
             "-H", "Content-Type: application/json",
             "-H", "Accept: application/json, text/event-stream",
             "-d", '{"jsonrpc":"2.0","method":"tools/list","id":1}']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Backend Node.js ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./ckan-chat/backend
      dockerfile: Dockerfile
    container_name: ckan-chat-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      SERVER_IP: ${SERVER_IP:-localhost}
      MCP_URL: http://ckan-mcp-server:3000/mcp
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:1.7b}
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
    depends_on:
      ckan-mcp-server:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # ── Frontend React ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./ckan-chat/frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: http://${SERVER_IP:-localhost}:${BACKEND_PORT:-3001}
    container_name: ckan-chat-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  ollama_data:
