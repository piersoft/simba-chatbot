services:

  # ── Ollama ────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # modelli persistenti tra riavvii
    environment:
      - OLLAMA_KEEP_ALIVE=24h       # tiene il modello in memoria
      - OLLAMA_NUM_PARALLEL=1       # richieste parallele (aumenta con più RAM)
    deploy:
      resources:
        limits:
          memory: 3G                # aggiusta in base alla RAM disponibile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Ollama model puller (scarica il modello al primo avvio) ───────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_MODEL:-qwen2.5:0.5b} && echo 'Modello pronto'"]
    restart: "no"

  # ── CKAN MCP Server ───────────────────────────────────────────────────────
  ckan-mcp-server:
    build:
      context: ./ckan-mcp-server
      dockerfile: Dockerfile
    image: ckan-mcp-server:latest
    container_name: ckan-mcp-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TRANSPORT: http
      PORT: 3000
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "http://localhost:3000/mcp",
             "-H", "Content-Type: application/json",
             "-H", "Accept: application/json, text/event-stream",
             "-d", '{"jsonrpc":"2.0","method":"tools/list","id":1}']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Backend Node.js ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./ckan-chat/backend
      dockerfile: Dockerfile
    container_name: ckan-chat-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MCP_URL: http://ckan-mcp-server:3000/mcp
      # --- scegli UNO dei due motori ---
      # Opzione A: Ollama locale (tutto in locale)
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:1.7b}
      # Opzione B: Anthropic (commenta le 2 righe sopra e decommenta sotto)
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # ANTHROPIC_MODEL: claude-haiku-4-5-20251001
    depends_on:
      ckan-mcp-server:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # ── Frontend React ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./ckan-chat/frontend
      dockerfile: Dockerfile
    container_name: ckan-chat-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  ollama_data:    # i modelli sopravvivono ai riavvii del container
